<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyBitEngine v0.1.2 — Documentazione</title>
    <style>
        /* ----- Reset e base ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f5f7fa; color: #1e293b; line-height: 1.6; transition: background .2s, color .2s; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        a { color: #2563eb; text-decoration: none; }
        body.dark a { color: #60a5fa; }
        a:hover { text-decoration: underline; }

        /* ----- Scrollbar ----- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        body.dark ::-webkit-scrollbar-thumb { background: #334155; }

        /* ----- Layout ----- */
        .app { display: flex; flex-direction: column; min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 100; background: #ffffffcc; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; padding: 0.6rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; transition: background .2s, border-color .2s; }
        body.dark .header { background: #1e293bcc; border-color: #334155; }
        .header .logo { font-weight: 700; font-size: 1.3rem; letter-spacing: -0.5px; color: #0f172a; }
        body.dark .header .logo { color: #f1f5f9; }
        .header .logo span { color: #2563eb; }
        body.dark .header .logo span { color: #60a5fa; }
        .header .version { font-size: 0.75rem; background: #e2e8f0; padding: 0.1rem 0.6rem; border-radius: 12px; color: #475569; }
        body.dark .header .version { background: #334155; color: #cbd5e1; }
        .search-wrap { flex: 1; min-width: 200px; position: relative; }
        .search-wrap input { width: 100%; padding: 0.4rem 1rem 0.4rem 2.2rem; border: 1px solid #e2e8f0; border-radius: 30px; background: #f8fafc; font-size: 0.9rem; outline: none; transition: border .2s, background .2s; color: #1e293b; }
        body.dark .search-wrap input { background: #1e293b; border-color: #334155; color: #e2e8f0; }
        .search-wrap input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px #2563eb30; }
        .search-wrap .icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }
        .theme-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 20px; color: #475569; transition: background .2s; }
        body.dark .theme-toggle { color: #e2e8f0; }
        .theme-toggle:hover { background: #e2e8f040; }

        .body-wrap { display: flex; flex: 1; }

        /* ----- Sidebar ----- */
        .sidebar { width: 280px; flex-shrink: 0; background: #ffffff; border-right: 1px solid #e2e8f0; padding: 1.2rem 0.8rem; overflow-y: auto; max-height: calc(100vh - 70px); position: sticky; top: 70px; transition: background .2s, border-color .2s, transform .3s ease; }
        body.dark .sidebar { background: #1e293b; border-color: #334155; }
        .sidebar.collapsed { transform: translateX(-100%); width: 0; padding: 0; border: none; overflow: hidden; }
        .sidebar-toggle { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 0.2rem 0.5rem; color: #475569; display: none; }
        body.dark .sidebar-toggle { color: #e2e8f0; }
        .sidebar h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin: 1.2rem 0 0.5rem 0.5rem; font-weight: 600; }
        body.dark .sidebar h3 { color: #94a3b8; }
        .sidebar ul { list-style: none; margin-bottom: 1.5rem; }
        .sidebar li { margin: 0.1rem 0; }
        .sidebar a { display: block; padding: 0.25rem 0.8rem; border-radius: 6px; font-size: 0.9rem; color: #334155; transition: background .15s, color .15s; }
        body.dark .sidebar a { color: #cbd5e1; }
        .sidebar a:hover { background: #e2e8f0; text-decoration: none; }
        body.dark .sidebar a:hover { background: #334155; }
        .sidebar a.active { background: #2563eb20; color: #2563eb; font-weight: 500; }
        body.dark .sidebar a.active { background: #2563eb30; color: #60a5fa; }
        .sidebar .badge { font-size: 0.7rem; background: #e2e8f0; color: #475569; border-radius: 12px; padding: 0 0.5rem; margin-left: 0.4rem; }
        body.dark .sidebar .badge { background: #334155; color: #cbd5e1; }

        /* ----- Main content ----- */
        .main { flex: 1; padding: 1.5rem 2rem 4rem; max-width: 1100px; min-width: 0; }
        .main section { margin-bottom: 3rem; scroll-margin-top: 80px; }
        .main h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        body.dark .main h1 { border-color: #334155; }
        .main h2 { font-size: 1.6rem; font-weight: 600; margin: 1.8rem 0 0.8rem; }
        .main h3 { font-size: 1.2rem; font-weight: 600; margin: 1.4rem 0 0.6rem; }
        .main h4 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #475569; }
        body.dark .main h4 { color: #94a3b8; }
        .main p { margin: 0.6rem 0; }
        .main .desc { background: #f1f5f9; padding: 0.8rem 1.2rem; border-radius: 8px; border-left: 4px solid #2563eb; margin: 0.8rem 0; }
        body.dark .main .desc { background: #1e293b; border-left-color: #60a5fa; }
        .main .sig { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: #eef2f6; padding: 0.4rem 1rem; border-radius: 6px; display: inline-block; font-size: 0.95rem; margin: 0.4rem 0; }
        body.dark .main .sig { background: #1e293b; }

        /* ----- Tabelle parametri ----- */
        .param-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 0.8rem 0; }
        .param-table th { text-align: left; background: #e2e8f0; padding: 0.4rem 0.8rem; font-weight: 600; }
        body.dark .param-table th { background: #334155; }
        .param-table td { padding: 0.4rem 0.8rem; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        body.dark .param-table td { border-color: #334155; }
        .param-table tr:last-child td { border-bottom: none; }
        .param-table .type { font-family: monospace; color: #2563eb; }
        body.dark .param-table .type { color: #60a5fa; }
        .param-table .default { font-family: monospace; color: #64748b; }
        body.dark .param-table .default { color: #94a3b8; }

        /* ----- Esempi di codice ----- */
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem 1.2rem; border-radius: 8px; overflow-x: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.5; margin: 0.8rem 0; position: relative; white-space: pre-wrap; }

        /* ----- Card funzione ----- */
        .func-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.2rem 1.5rem; margin: 1.2rem 0; transition: background .2s, border-color .2s; }
        body.dark .func-card { background: #1e293b; border-color: #334155; }
        .func-card .func-header { display: flex; align-items: baseline; gap: 0.8rem; flex-wrap: wrap; }
        .func-card .func-name { font-size: 1.2rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .func-card .func-category { font-size: 0.75rem; background: #e2e8f0; padding: 0.1rem 0.6rem; border-radius: 12px; color: #475569; }
        body.dark .func-card .func-category { background: #334155; color: #cbd5e1; }
        .func-card .func-sig { font-family: 'JetBrains Mono', monospace; background: #f1f5f9; padding: 0.2rem 1rem; border-radius: 6px; margin: 0.5rem 0; font-size: 0.9rem; }
        body.dark .func-card .func-sig { background: #0f172a; }
        .func-card .func-desc { margin: 0.6rem 0; }
        .func-card .func-returns { margin: 0.4rem 0; font-size: 0.9rem; }
        .func-card .func-returns strong { font-weight: 600; }

        /* ----- Link interni / ToC ----- */
        .toc { background: #f8fafc; border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; border: 1px solid #e2e8f0; }
        body.dark .toc { background: #1e293b; border-color: #334155; }
        .toc ul { columns: 2 200px; list-style: none; padding: 0; }
        .toc li { margin: 0.2rem 0; }
        .toc a { font-size: 0.9rem; }

        /* ----- Responsive ----- */
        @media (max-width: 800px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 200; transform: translateX(-100%); width: 280px; padding: 1.2rem 0.8rem; box-shadow: 0 0 30px #00000020; transition: transform .3s ease; border-right: 1px solid #e2e8f0; max-height: 100vh; background: #ffffff; }
            body.dark .sidebar { background: #1e293b; border-color: #334155; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle { display: block; }
            .main { padding: 1rem 1rem 3rem; }
            .header { padding: 0.4rem 1rem; }
            .header .logo { font-size: 1rem; }
            .search-wrap input { font-size: 0.8rem; padding: 0.3rem 1rem 0.3rem 2rem; }
            .func-card { padding: 0.8rem 1rem; }
            .toc ul { columns: 1; }
            .param-table { font-size: 0.8rem; }
            .param-table th, .param-table td { padding: 0.3rem 0.5rem; }
        }
        @media (max-width: 500px) {
            .header .logo { font-size: 0.9rem; }
            .search-wrap { min-width: 120px; }
            .search-wrap input { padding-left: 1.8rem; font-size: 0.75rem; }
            .func-card .func-name { font-size: 1rem; }
        }

        /* ----- Pulsante top ----- */
        .back-top { position: fixed; bottom: 2rem; right: 2rem; background: #2563eb; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 1.4rem; cursor: pointer; box-shadow: 0 4px 12px #2563eb40; transition: opacity .2s, transform .2s; opacity: 0; pointer-events: none; transform: scale(0.9); }
        .back-top.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
        .back-top:hover { background: #1d4ed8; transform: scale(1.05); }
        body.dark .back-top { box-shadow: 0 4px 12px #2563eb60; }

        /* ----- Stato vuoto ricerca ----- */
        .no-results { text-align: center; padding: 3rem 1rem; color: #94a3b8; font-size: 1.1rem; }
        body.dark .no-results { color: #64748b; }
        .highlight { background: #fde68a; color: #1e293b; padding: 0 0.2rem; border-radius: 2px; }
        body.dark .highlight { background: #fcd34d40; color: #fcd34d; }

        /* ----- Badge compatibilità ----- */
        .badge-compat { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 12px; background: #dbeafe; color: #1e40af; margin-left: 0.4rem; }
        body.dark .badge-compat { background: #1e3a5f; color: #93c5fd; }
        .badge-gpu { background: #fce7f3; color: #9d174d; }
        body.dark .badge-gpu { background: #4c1d3b; color: #f9a8d4; }
        .badge-cpu { background: #d1fae5; color: #065f46; }
        body.dark .badge-cpu { background: #1a3a2a; color: #6ee7b7; }

        /* ----- Animazioni ----- */
        .fade-in { animation: fade .3s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ----- Sezione licenze e dipendenze ----- */
        .deps-section { background: #f1f5f9; border-radius: 12px; padding: 1.2rem 1.8rem; margin: 1.5rem 0; border-left: 4px solid #2563eb; }
        body.dark .deps-section { background: #1e293b; border-left-color: #60a5fa; }
        .deps-section ul { margin: 0.5rem 0 0 1.2rem; }
        .deps-section li { margin: 0.3rem 0; }
        .deps-section .license { font-family: monospace; background: #e2e8f0; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.8rem; }
        body.dark .deps-section .license { background: #334155; }
        /* Copyright */
        .footer-copy { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0; font-size: 0.9rem; color: #64748b; }
        body.dark .footer-copy { border-color: #334155; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">Py<span>BitEngine</span></div>
            <span class="version">v0.1.2</span>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
            <div class="search-wrap">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cerca moduli, funzioni, parametri..." autocomplete="off">
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </header>

        <div class="body-wrap">
            <aside class="sidebar" id="sidebar">
                <div id="sidebarContent"></div>
            </aside>
            <main class="main" id="mainContent">
                <!-- Generato da JS -->
            </main>
        </div>
    </div>

    <button class="back-top" id="backTop" aria-label="Torna su">↑</button>

                <h2>1. Creare una finestra e il loop</h2>
                <p>Per utilizzare il motore, devi creare una tua classe che eredita da <code>WINDOW</code> e implementare i metodi <code>update(dt, events)</code> e <code>draw()</code>.</p>

import sys
from PyBitEngine import WINDOW, PE_KEYDOWN, PE_K_SPACE

class MyGame(WINDOW):
    def __init__(self):
        # Imposta titolo, posizione, dimensione, VSync, ecc.
        super().__init__(
            title="Il mio gioco",
            geometry=("center", "center", 800, 600),
            VSync=True,
            max_fps=60      # limite opzionale
        )
        self.player_x = 100
        self.player_y = 100
        self.speed = 200   # pixel al secondo

    def update(self, dt, events):
        # events è una lista di PE_Event
        for ev in events:
            if ev.type == PE_KEYDOWN:
                if ev.key == PE_K_SPACE:
                    print("Spazio premuto!")

        # Muovi il giocatore con i tasti freccia (esempio)
        # Usa PE_K_LEFT, PE_K_RIGHT, ecc.
        # (qui per brevità usiamo solo spazio)

        self.player_x += self.speed * dt   # movimento semplice

    def draw(self):
        # Tutti i comandi di disegno vanno qui
        self.DrawRect(self.player_x, self.player_y, 50, 50, color=(255,0,0))
        self.DrawText("Premi SPACE", 10, 10, color=(0,0,0))

if __name__ == "__main__":
    game = MyGame()
    game.Loop()   # avvia il loop infinito

                <h2>2. Il ciclo di vita del loop</h2>
                <p>Il metodo <code>Loop()</code> avvia il loop principale che:</p>
                <ul>
                    <li>Raccoglie gli eventi SDL e li trasforma in oggetti <code>PE_Event</code>.</li>
                    <li>Calcola il delta time (<code>dt</code>) e lo passa a <code>update()</code> insieme alla lista degli eventi.</li>
                    <li>Chiama <code>draw()</code> dopo aver pulito lo schermo.</li>
                    <li>Gestisce il frame rate (se impostato con <code>SetMaxFPS</code>).</li>
                    <li>Esegue il garbage collector manuale se attivato.</li>
                </ul>
                <p>Il loop termina quando <code>self.running = False</code> (ad esempio in risposta a un evento di chiusura o a un comando).</p>
                <pre>
def update(self, dt, events):
    for ev in events:
        if ev.type == PE_KEYDOWN and ev.key == PE_K_ESCAPE:
            self.running = False   # esce dal loop
                </pre>

                <h2>3. Gestione degli eventi</h2>
                <p>Gli eventi sono oggetti <code>PE_Event</code> con i seguenti attributi principali:</p>
                <ul>
                    <li><code>type</code> : stringa che identifica il tipo (vedi costanti).</li>
                    <li><code>key</code>   : codice del tasto (per eventi tastiera).</li>
                    <li><code>button</code>: pulsante del mouse (per eventi mouse).</li>
                    <li><code>x, y</code>  : posizione del mouse (per eventi mouse).</li>
                    <li><code>dx, dy</code>: spostamento relativo (per motion/drag).</li>
                    <li><code>clicks</code>: numero di click (per button down).</li>
                    <li><code>wheel_x, wheel_y</code>: scroll orizzontale/verticale.</li>
                </ul>
                <p><strong>Tipi di evento</strong> (costanti):</p>
                <ul>
                    <li><code>PE_KEYDOWN</code>, <code>PE_KEYUP</code> — tasti premuti/rilasciati.</li>
                    <li><code>PE_MOUSEMOTION</code> — movimento mouse senza pulsanti premuti.</li>
                    <li><code>PE_MOUSEDRAG</code> — movimento mouse con almeno un pulsante premuto.</li>
                    <li><code>PE_MOUSEBUTTONDOWN</code>, <code>PE_MOUSEBUTTONUP</code> — click.</li>
                    <li><code>PE_MOUSEWHEEL</code> — rotellina (contiene anche posizione mouse).</li>
                </ul>
                <p><strong>Tasti</strong>: costanti <code>PE_K_*</code> (es. <code>PE_K_a</code>, <code>PE_K_UP</code>, <code>PE_K_SPACE</code>, <code>PE_K_F1</code>).</p>
                <p><strong>Pulsanti mouse</strong>: <code>PE_MOUSE_LEFT</code>, <code>PE_MOUSE_MIDDLE</code>, <code>PE_MOUSE_RIGHT</code>, <code>PE_MOUSE_X1</code>, <code>PE_MOUSE_X2</code>.</p>
                <p>Esempio di gestione del drag:</p>
                <pre>
def update(self, dt, events):
    for ev in events:
        if ev.type == PE_MOUSEDRAG:
            print(f"Trascinamento a ({ev.x}, {ev.y})")
        elif ev.type == PE_MOUSEWHEEL:
            print(f"Scroll: {ev.wheel_y}")
                </pre>

                <h2>4. Disegno e texture</h2>
                <p>La classe <code>WINDOW</code> eredita da <code>DRAW</code>, quindi tutti i metodi di disegno sono direttamente disponibili:</p>
                <ul>
                    <li><code>DrawRect</code>, <code>DrawLine</code>, <code>DrawCircle</code>, <code>DrawEllipse</code>, <code>DrawTriangle</code>, <code>DrawBezierCurve</code>.</li>
                    <li><code>LoadTexture</code>, <code>DrawTexture</code>, <code>LoadTextureAtlas</code>.</li>
                    <li><code>DrawText</code> (richiede Pillow e font registrato con <code>RegisterFont</code>).</li>
                    <li>Batch: <code>DrawRectsBatch</code>, <code>DrawLinesBatch</code>, <code>DrawTrianglesBatch</code>, <code>DrawEllipsesBatch</code>, <code>DrawSpritesBatch</code>, <code>DrawRoundedRectsBatch</code>, <code>DrawRoundedTrianglesBatch</code>.</li>
                </ul>
                <p>Per un rendering efficiente, le primitive vengono accumulate in buffer e inviate alla GPU solo quando necessario (<code>Flush</code>).</p>

                <h2>5. Telecamere</h2>
                <p>Il modulo <code>PE_CAMERA</code> offre due implementazioni:</p>
                <ul>
                    <li><strong>CameraGPU</strong> : usa un FBO per muovere l'intera scena con un solo draw call. Ora supporta MSAA tramite il parametro <code>samples</code> nel costruttore.</li>
                    <li><strong>CameraCPU</strong> : trasforma ogni coordinata in Python/NumPy. Offre massimo controllo e frustum culling.</li>
                </ul>
                <p>Vedi la sezione <a href="#module-PE_CAMERA">PE_CAMERA</a> per i dettagli.</p>

                <h2>6. Garbage Collector</h2>
                <p>Per applicazioni che creano molti oggetti temporanei, il motore offre un controllo manuale del GC tramite <code>SetGCAuto</code> (vedi metodi di <code>WINDOW</code>). Puoi raccogliere periodicamente (frame, tempo o soglia oggetti) per evitare picchi di latenza.</p>

                <h2>7. Packaging del gioco</h2>
                <p>Il modulo <code>PE_PAKER</code> offre la funzione <code>pack()</code> per esportare il gioco come applicazione standalone (eseguibile) tramite <code>cx_Freeze</code>, senza dover scrivere manualmente uno <code>setup.py</code>.</p>

from PyBitEngine import pack

pack(
    "main.py",
    name="MyGame",
    version="1.0.0",
    include_dirs=["assets"],
    icon="icon.ico"
)
# Crea dist/MyGame/ con l'eseguibile e le risorse pronte per la distribuzione

        function filterItems(query) {
            const q = query.toLowerCase().trim();
            const sections = document.querySelectorAll('#mainContent section');
            let foundAny = false;
            let exactMatchId = null;
            if (q.length >= 2) {
                for (let [name, id] of Object.entries(functionIdMap)) {
                    if (name === q || name.startsWith(q)) {
                        exactMatchId = id;
                        break;
                    }
                }
            }
            sections.forEach(section => {
                let show = false;
                if (q === '') {
                    show = true;
                } else {
                    const text = section.textContent.toLowerCase();
                    if (text.includes(q)) show = true;
                    const id = section.id.replace('module-', '');
                    const mod = DOC_DATA.modules.find(m => m.id === id);
                    if (mod) {
                        mod.classes.forEach(cls => {
                            if (cls.methods) {
                                cls.methods.forEach(m => {
                                    const full = `${mod.name} ${cls.name} ${m.name} ${m.sig} ${m.desc} ${m.params.map(p=>p.name).join(' ')}`.toLowerCase();
                                    if (full.includes(q)) show = true;
                                });
                            }
                            if (cls.properties) {
                                cls.properties.forEach(p => {
                                    if (`${p.name} ${p.desc}`.toLowerCase().includes(q)) show = true;
                                });
                            }
                        });
                        if (mod.constants) {
                            mod.constants.forEach(c => {
                                if (`${c.name} ${c.desc}`.toLowerCase().includes(q)) show = true;
                            });
                        }
                        if (mod.functions) {
                            mod.functions.forEach(f => {
                                const full = `${mod.name} ${f.name} ${f.sig} ${f.desc} ${(f.params||[]).map(p=>p.name).join(' ')}`.toLowerCase();
                                if (full.includes(q)) show = true;
                            });
                        }
                    }
                }
                section.style.display = show ? '' : 'none';
                if (show) foundAny = true;
            });
            if (exactMatchId) {
                const targetEl = document.getElementById(exactMatchId);
                if (targetEl) {
                    let parent = targetEl.closest('section');
                    if (parent && parent.style.display !== 'none') {
                        setTimeout(() => {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    }
                }
            }
            let msg = document.getElementById('noResults');
            if (!foundAny && q !== '') {
                if (!msg) {
                    msg = document.createElement('div');
                    msg.id = 'noResults';
                    msg.className = 'no-results';
                    msg.textContent = 'Nessun risultato trovato.';
                    main.appendChild(msg);
                }
            } else if (msg) {
                msg.remove();
            }
        }
